<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="style.css" />
    <title>OpenHub</title>
    <!-- Basic Icons -->
    <link
      href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css"
      rel="stylesheet"
    />
    <!-- Filled Icons -->
    <link
      href="https://cdn.boxicons.com/3.0.8/fonts/filled/boxicons-filled.min.css"
      rel="stylesheet"
    />
    <!-- Brand Icons -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=mode_night"
    />
    <link
      href="https://cdn.boxicons.com/3.0.8/fonts/brands/boxicons-brands.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=mode_night"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=search"
    />
  </head>
  <body class="dark">
    <header>
      <nav>
        <ul class="topbar-ul">
          <li class="noclickable logo"><h2>OpenHub</h2></li>
          <li>Downloads</li>
          <li>Donate</li>
          <li><button class="admin">Admin panel</button></li>
        </ul>
        <button class="switch">
          <div class="switchdark"></div>
          <div class="switchlight"></div>
        </button>
      </nav>
    </header>
    <main>
      <section class="home">
        <h1>OpenHub
        </h1>
        <h2>
          <span class="words">
             <span>upload your apps</span>
             <span>download</span>
             <span>from everywhere</span>
             <span>for free</span>
          </span>
        </h2>
        <div class="search">
          <button class="search-button">
            <span class="material-symbols-outlined">search</span>
          </button>
          <input class="search-input" name="" id="" placeholder="Search" />
        </div>
      </section>
    </main>

    <script src="main.js"></script>
  </body>
</html>
